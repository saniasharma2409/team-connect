<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management Dashboard</title>

    <link rel="stylesheet" href="dashboard.css">
     <link rel="stylesheet" href="add.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="dashboard-container">

    <!-- Main Content -->

    <main class="main-content">



        <!-- Navbar -->

        <header class="navbar">

            <div class="title">

                <h1>Add Employee</h1>
                <p>Create your profile here</p>

            </div>



            <div class="thought-navbar">

                <h3>Thought of the Day</h3>

                <input class="thought" type="text" placeholder="Share your thought...">
            </div>



            <div class="mprofile">

                <img src="https://i.pravatar.cc/45" alt="profile">

                <span>Admin</span>

            </div>

        </header>
<div class="main">
        <form>
            <h2>Create Employee Profile</h2>
            <input required type="text" placeholder="Profile Image URL" id="url">
            <input required type="text" placeholder="Name" id="name">
            <input required type="email" placeholder="email" id="email">
            <input required type="text" placeholder="Degignation" id="designation">
            <input required type="text" placeholder="About" id="about">
            <input type="submit" value="Create Profile">
        </form>



        </div>
    </div>
</div>
 <script src="add.js"></script>
 <script src="sidebar.js"></script>
 <script src="theme.js"></script>
</body>
</html>
